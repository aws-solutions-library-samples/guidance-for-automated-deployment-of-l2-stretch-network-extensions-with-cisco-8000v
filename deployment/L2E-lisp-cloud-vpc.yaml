AWSTemplateFormatVersion: "2010-09-09"
Description: "(SO9690) - AWS cloud-side VPC and Cisco Catalyst 8000V deployment for L2 stretch network using LISP."
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Network Configuration"
        Parameters:
          - LispCloudVpcCidr
          - LispCloudPublicSubnetCidr
          - LispCloudPrivateSubnetCidr
          - LispCloud8KvPrivateInterfaceIP
      - Label:
          default: "8Kv Instance Configuration"
        Parameters:
          - LispCloud8KvInstanceType
          - LispCloud8KvVersion
          - Hostname
          - AuthenticationType
          - KeyName
          - Username
          - PrivilegePwd
      - Label:
          default: "LISP Configuration"
        Parameters:
          - LispCloudLoopback
          - LispOnPremLoopback
      - Label:
          default: "IPSec Configuration"
        Parameters:
          - IPSecPreShareKey
          - TunnelDestinationPublicIP
      - Label:
          default: "Security Configuration"
        Parameters:
          - ParticipantIPAddress
      - Label:
          default: "Application Server Configuration"
        Parameters:
          - DeployAppServer

    ParameterLabels:
      LispCloudVpcCidr:
        default: "VPC CIDR"
      LispCloudPublicSubnetCidr:
        default: "Public Subnet CIDR"
      LispCloudPrivateSubnetCidr:
        default: "Private Subnet CIDR"
      LispCloud8KvPrivateInterfaceIP:
        default: "8Kv Private Interface IP (Optional)"
      LispCloud8KvInstanceType:
        default: "8Kv Instance Type"
      LispCloud8KvVersion:
        default: "8Kv Software Version"
      Hostname:
        default: "8Kv Hostname"
      AuthenticationType:
        default: "Authentication Type"
      KeyName:
        default: "SSH Key Pair"
      Username:
        default: "Username"
      PrivilegePwd:
        default: "Password"
      LispCloudLoopback:
        default: "Cloud LISP Loopback"
      LispOnPremLoopback:
        default: "On-Prem LISP Loopback"
      IPSecPreShareKey:
        default: "IPSec Pre-Shared Key"
      TunnelDestinationPublicIP:
        default: "Tunnel Destination IP"
      ParticipantIPAddress:
        default: "Participant IP Address"
      DeployAppServer:
        default: "Deploy Application Server"
Parameters:
  LispCloudVpcCidr:
    AllowedPattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/(1[6-9]|2[0-8]))$"
    ConstraintDescription: CIDR block parameter must be in the form x.x.x.x/16-28
    Description: 'CIDR block for the AWS VPC. Must be a superset of the Lisp Private Subnet that will be stretched from on-prem to cloud, and must not overlap any existing on-prem or AWS network. Example: 172.16.0.0/16'
    Type: String
  LispCloudPublicSubnetCidr:
    AllowedPattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/(1[6-9]|2[0-8]))$"
    ConstraintDescription: CIDR block parameter must be in the form x.x.x.x/16-28
    Description: 'CIDR block for the public subnet that hosts the Cisco 8000V external interface. Must be inside the VPC CIDR. Example: 172.16.0.0/24'
    Type: String
  LispCloudPrivateSubnetCidr:
    AllowedPattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/(1[6-9]|2[0-8]))$"
    ConstraintDescription: CIDR block parameter must be in the form x.x.x.x/16-28
    Description: 'CIDR block stretched from on-prem to AWS via LISP. This MUST exactly match the on-prem subnet you intend to extend. Example: 172.16.1.0/24'
    Type: String
  LispCloud8KvInstanceType:
    AllowedValues:
      - t3.medium
      - c5.large
      - c5.xlarge
      - c5.2xlarge
      - c5.4xlarge
      - c5.9xlarge
      - c5d.2xlarge
      - c5n.large
      - c5n.xlarge
      - c5n.2xlarge
      - c5n.4xlarge
      - c5n.9xlarge
      - c5n.18xlarge
      - c6in.large
      - c6in.2xlarge
      - c6in.4xlarge
      - c6in.8xlarge
    Default: c5n.large
    Description: EC2 instance type for the Cisco 8000V router.
    Type: String
  LispCloud8KvVersion:
    AllowedValues:
      - 8kv17908
      - 8kv171301a
      - 8kv171503a
    Default: 8kv171503a
    Description: Cisco 8000v software version (17.09.08, 17.13.01a, or 17.15.03a)
    Type: String

  ParticipantIPAddress:
    Type: String
    Description: 'What is your external IP address in the format x.x.x.x/32? This entry will be added to certain Security Groups. Find your IP at https://checkip.amazonaws.com/'
    AllowedPattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/(32))$"
    ConstraintDescription: must be a valid IP address of the form x.x.x.x/32.
  Hostname:
    Description: Specify the hostname of the 8Kv router
    Type: String
  AuthenticationType:
    Type: String
    AllowedValues:
      - KeyPair
      - UsernamePassword
    Default: KeyPair
    Description: Choose authentication type for the Cisco router
  KeyName:
    Description: Must be a valid SSH key name or left blank if using UsernamePassword.
    Type: String
  Username:
    Description: Specify the username (required if AuthenticationType is UsernamePassword)
    Type: String
  PrivilegePwd:
    Description: Specify the password (required if AuthenticationType is UsernamePassword)
    NoEcho: 'True'
    Type: String
  LispCloudLoopback:
    Description: 'Loopback address of the AWS 8Kv LISP router, used as the cloud-side LISP RLOC. This address is reachable only inside the IPSec/LISP tunnel and is NOT routed on the public internet, so it can safely be set to a value that is not part of your routable address space. Example: 33.33.33.33'
    Type: String
  IPSecPreShareKey:
    Description: PreShared key for IPSec IKEv1 tunnel. Also using this for Lisp Map Key
    Type: String
    NoEcho: 'True'
  TunnelDestinationPublicIP:
    Description: Public IP address of the on-prem Lisp Router
    Type: String
  LispOnPremLoopback:
    Description: 'Loopback address of the on-prem LISP router, used as the on-prem LISP RLOC. Must match the loopback configured on your on-prem Cisco router. This address is reachable only inside the IPSec/LISP tunnel and is NOT routed on the public internet, so it can safely be set to a value that is not part of your routable address space. Example: 11.11.11.11'
    Type: String
  LispCloud8KvPrivateInterfaceIP:
    Description: '(Optional) Manually specify the private IP address for the 8KV private interface (GigabitEthernet2). Leave empty for automatic assignment.'
    Type: String
    Default: ''
  DeployAppServer:
    Description: 'Choose whether to deploy the application server in the private subnet'
    Type: String
    AllowedValues:
      - 'Yes'
      - 'No'
    Default: 'Yes'
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-minimal-kernel-default-x86_64'
    Description: 'SSM parameter for the latest Amazon Linux 2023 AMI'

